steps:
  # 0. Diagnostic step (Optional but helpful)
  - name: 'bash'
    args: ['ls', '-R']

  # 1. Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'asia-south2-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/google-solutions:$COMMIT_SHA', '-f', 'backend/Dockerfile', '.']

  # 2. Push the container image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'asia-south2-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/google-solutions:$COMMIT_SHA']

  # 3. Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'google-solutions'
      - '--image'
      - 'asia-south2-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/google-solutions:$COMMIT_SHA'
      - '--region'
      - 'asia-south2'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

images:
  - 'asia-south2-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/google-solutions:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
